name: Build Android APK with Kivy Action

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with kivy-buildozer-action
        uses: ArtemSBMB/kivy-buildozer-action@v0.2
        with:
          buildozer-version: latest
          android-api-level: 33
        env:
          # 这会把生成的 APK 作为 artifact 上传
          BUILD_OUTPUT: bin/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: haofan-apk
          path: bin/*.apk
