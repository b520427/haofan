name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev python3-pip \
          libffi-dev libssl-dev autoconf libtool pkg-config libltdl-dev \
          openjdk-17-jdk unzip zlib1g-dev libncurses5-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade cython buildozer

    - name: Clean and init buildozer
      run: |
        buildozer android clean
        buildozer android update

    - name: Build APK with buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: haofan-apk
        path: bin/*.apk
